<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>画像切り替えセクション</title>
    <link rel="stylesheet" href="css/画像切り替えセクション_test.css" />
  </head>
  <body>
    <main class="gallery_area">
      <!-- 下段に小さいサイズの複数の画面があり、上に一つのメイン画像がある。 クリックすると切り替え-->

      <!-- メイン画像 -->
      <img src="img/mainvisual1.jpg" alt="" class="gallery_main" />

      <!-- サムネイル一覧【flex 横5列: サムネイル画像 ×5】 -->
      <div class="gallery_thumbnails">
        <img alt="" class="gallery_img" src="img/mainvisual1.jpg" />
        <img alt="" class="gallery_img" src="img/mainvisual2.jpg" />
        <img alt="" class="gallery_img" src="img/mainvisual3.jpg" />
        <img alt="" class="gallery_img" src="img/mainvisual4.jpg" />
        <img alt="" class="gallery_img" src="img/mainvisual5.jpg" />
      </div>
      <!-- jqueryを読み込む -->
      <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
      <script src="js/画像切り替えセクション_test2.js"></script>
    </main>
  </body>
</html>
